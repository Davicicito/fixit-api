# Nombre del proyecto
spring.application.name=fixit-api

# Conexión a la base de datos de XAMPP
spring.datasource.url=jdbc:mysql://localhost:3306/fixit_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Configuración de JPA y Hibernate

# Crea o actualiza las tablas automáticamente basándose en tus clases Java
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola para depurar
spring.jpa.show-sql=true